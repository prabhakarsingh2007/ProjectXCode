services:
  # Django REST API Backend
  - type: web
    name: projectxcode-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python seed_data.py
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "projectxcode-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: projectxcode-db
          property: connectionString

  # React Frontend (Static Site)
  - type: web
    name: projectxcode-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://projectxcode-backend.onrender.com/api

databases:
  - name: projectxcode-db
    plan: free
